<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Río Turbio Turismo</title>

<style>
:root{
    --primary:#004a8c;
    --accent:#f39c12;
    --bg:#f0f2f5;
}

body{
    margin:0;
    font-family: Arial;
    background:var(--bg);
    padding-bottom:140px;
}

/* HEADER */
header{
    background:var(--primary);
    color:white;
    padding:30px;
    text-align:center;
    border-bottom-left-radius:25px;
    border-bottom-right-radius:25px;
}

/* SECCIONES */
.section{
    padding:15px;
}

.section h2{
    margin-bottom:10px;
}

/* SCROLL HORIZONTAL */
.scroll{
    display:flex;
    gap:10px;
    overflow-x:auto;
}

.scroll::-webkit-scrollbar{display:none}

/* TARJETAS */
.card{
    min-width:140px;
    background:white;
    border-radius:15px;
    overflow:hidden;
    cursor:pointer;
    box-shadow:0 4px 8px rgba(0,0,0,0.1);
}

.card img{
    width:100%;
    height:100px;
    object-fit:cover;
    object-position:top;
}

.card p{
    font-size:12px;
    text-align:center;
    padding:5px;
}

/* DETALLE */
#detalle{
    background:white;
    margin:15px;
    border-radius:15px;
    padding:15px;
    display:none;
}

#detalle img{
    width:100%;
    border-radius:10px;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
}

.box{
    background:white;
    padding:15px;
    border-radius:15px;
}

/* PLAYER */
.player{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    background:white;
    padding:15px;
    border-top:4px solid var(--primary);
}
</style>
</head>

<body>

<header>
    <h1>Río Turbio</h1>
    <p>Turismo Inteligente</p>
</header>

<!-- LUGARES -->
<div class="section">
<h2>🎧 Lugares destacados</h2>

<div class="scroll">

<div class="card" onclick="verLugar('Monumento al Minero','Historia del minero','mineros.m4a','https://maps.google.com')">
<img src="https://images.unsplash.com/photo-1604076913837-52ab5629fba9">
<p>Minero</p>
</div>

<div class="card" onclick="verLugar('Plaza Centenario','Centro de la ciudad','','https://maps.google.com')">
<img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb">
<p>Plaza</p>
</div>

<div class="card" onclick="verLugar('Bosque de Duendes','Lugar mágico','','https://maps.google.com')">
<img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e">
<p>Duendes</p>
</div>

<div class="card" onclick="verLugar('Mina 1','Historia minera','','https://maps.google.com')">
<img src="https://images.unsplash.com/photo-1581091215367-59ab6b1f92a0">
<p>Mina 1</p>
</div>

<div class="card" onclick="verLugar('Dique San José','Paisaje natural','','https://maps.google.com')">
<img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470">
<p>Dique</p>
</div>

</div>
</div>

<!-- DETALLE -->
<div id="detalle">
    <img id="imgDetalle">
    <h2 id="titulo"></h2>
    <p id="desc"></p>
    <button onclick="reproducir()">▶ Escuchar</button>
    <br><br>
    <a id="mapa" target="_blank">📍 Cómo llegar</a>
</div>

<!-- ACTIVIDADES -->
<div class="section">
<h2>🔥 Actividades</h2>

<div class="scroll">
<div class="card"><img src="https://images.unsplash.com/photo-1519681393784-d120267933ba"><p>Trekking</p></div>
<div class="card"><img src="https://images.unsplash.com/photo-1605540436563-5bca919ae766"><p>Valdelen</p></div>
<div class="card"><img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee"><p>Mirador</p></div>
</div>
</div>

<!-- BLOQUES -->
<div class="section grid">

<div class="box">
<h3>🏨 Hoteles</h3>
<p>Hospedaje local</p>
</div>

<div class="box">
<h3>🍴 Gastronomía</h3>
<p>Comida regional</p>
</div>

<div class="box">
<h3>🛍️ Productos</h3>
<p>Artesanías</p>
</div>

<div class="box">
<h3>🎿 Servicios</h3>
<p>Actividades guiadas</p>
</div>

</div>

<!-- PLAYER -->
<div class="player">
<p id="playing">Seleccioná un lugar</p>
<audio id="audio" controls style="width:100%"></audio>
</div>

<script>
let audioURL="";

function verLugar(titulo,desc,audio,mapa){
    document.getElementById("detalle").style.display="block";
    document.getElementById("titulo").innerText=titulo;
    document.getElementById("desc").innerText=desc;
    document.getElementById("mapa").href=mapa;
    document.getElementById("imgDetalle").src=event.target.src;

    audioURL=audio;
}

function reproducir(){
    if(!audioURL){
        alert("Audio no disponible");
        return;
    }

    const player=document.getElementById("audio");
    player.src=audioURL;
    player.play();

    document.getElementById("playing").innerText="Reproduciendo";
}
</script>

</body>
</html>
