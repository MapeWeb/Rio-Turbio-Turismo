<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Río Turbio Turismo</title>

<style>
:root{
    --primary:#004a8c;
    --bg:#f0f2f5;
}

body{
    margin:0;
    font-family: Arial;
    background:var(--bg);
}

/* HEADER */
header{
    background:var(--primary);
    color:white;
    padding:25px;
    text-align:center;
}

/* GRID 6 TARJETAS */
.grid{
    display:grid;
    grid-template-columns:repeat(6,1fr);
    gap:8px;
    padding:10px;
}

.card{
    border-radius:10px;
    overflow:hidden;
    cursor:pointer;
}

.card img{
    width:100%;
    height:80px;
    object-fit:cover;
}

/* DETALLE */
#detalle{
    display:none;
    padding:10px;
}

.main-img{
    width:100%;
    height:250px;
    object-fit:cover;
    border-radius:15px;
}

/* FLECHAS */
.nav{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    font-size:30px;
    color:white;
    cursor:pointer;
}

.left{left:10px}
.right{right:10px}

/* GALERÍA */
.galeria{
    display:flex;
    overflow-x:auto;
    gap:8px;
    margin-top:10px;
}

.galeria img{
    width:70px;
    height:50px;
    border-radius:8px;
    cursor:pointer;
}

/* BOTONES */
.btn{
    background:var(--primary);
    color:white;
    padding:10px;
    border:none;
    border-radius:10px;
    margin-top:10px;
    width:100%;
}

/* PLAYER */
.player{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    background:white;
    padding:10px;
    display:none;
}
</style>
</head>

<body>

<header>
<h1>Río Turbio</h1>
</header>

<!-- GRID -->
<div id="menu" class="grid">

<div class="card" onclick="abrir(this)">
<img src="https://i.ibb.co/21ky25s2/Sin-monumento-minero.png">
</div>

<div class="card" onclick="abrir(this)">
<img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e">
</div>

<div class="card" onclick="abrir(this)">
<img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470">
</div>

<div class="card" onclick="abrir(this)">
<img src="https://images.unsplash.com/photo-1519681393784-d120267933ba">
</div>

<div class="card" onclick="abrir(this)">
<img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee">
</div>

<div class="card" onclick="abrir(this)">
<img src="https://images.unsplash.com/photo-1605540436563-5bca919ae766">
</div>

</div>

<!-- DETALLE -->
<div id="detalle">

<button class="btn" onclick="volver()">⬅ Volver</button>

<div style="position:relative">

<img id="main" class="main-img">

<div class="nav left" onclick="cambiar(-1)">❮</div>
<div class="nav right" onclick="cambiar(1)">❯</div>

</div>

<div class="galeria" id="galeria"></div>

<button class="btn" onclick="audioPlay()">🔊 Escuchar</button>

</div>

<!-- PLAYER -->
<div class="player" id="playerBox">
<audio id="audio" controls style="width:100%"></audio>
</div>

<script>
let imagenes=[];
let index=0;

function abrir(el){

    document.getElementById("menu").style.display="none";
    document.getElementById("detalle").style.display="block";

    let img = el.querySelector("img").src;

    imagenes=[];

    for(let i=0;i<10;i++){
        imagenes.push(img);
    }

    index=0;
    actualizar();

    let galeria = document.getElementById("galeria");
    galeria.innerHTML="";

    imagenes.forEach((src,i)=>{
        let mini=document.createElement("img");
        mini.src=src;
        mini.onclick=()=>{
            index=i;
            actualizar();
        };
        galeria.appendChild(mini);
    });
}

function actualizar(){
    document.getElementById("main").src=imagenes[index];
}

function cambiar(dir){
    index+=dir;
    if(index<0) index=imagenes.length-1;
    if(index>=imagenes.length) index=0;
    actualizar();
}

function volver(){
    document.getElementById("menu").style.display="grid";
    document.getElementById("detalle").style.display="none";
}

/* AUDIO */
function audioPlay(){

    let player=document.getElementById("audio");
    let box=document.getElementById("playerBox");

    player.src="mineros.m4a";

    box.style.display="block";

    player.play();

    player.onended=()=>{
        box.style.display="none";
        player.src="";
    };
}
</script>

</body>
</html>
